<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | URL Shortener Pro</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:
        radial-gradient(circle at top right,#9333ea33,transparent 30%),
        radial-gradient(circle at bottom left,#7c3aed33,transparent 30%),
        #070816;
    padding:20px;
}

.login-card{
    width:100%;
    max-width:450px;
    padding:40px;
    border-radius:25px;
    background:rgba(255,255,255,.05);
    backdrop-filter:blur(15px);
    border:1px solid rgba(168,85,247,.25);
    box-shadow:0 0 40px rgba(168,85,247,.25);
}

.logo{
    text-align:center;
    font-size:50px;
    margin-bottom:10px;
}

.title{
    color:white;
    text-align:center;
    font-size:32px;
    font-weight:700;
}

.subtitle{
    text-align:center;
    color:#9ca3af;
    margin-bottom:30px;
}

.form-control{
    height:55px;
    background:#111827;
    border:1px solid #312e81;
    color:white;
    border-radius:12px;
}

.form-control:focus{
    background:#111827;
    color:white;
    border-color:#a855f7;
    box-shadow:0 0 15px rgba(168,85,247,.4);
}

.btn-login{
    height:55px;
    border:none;
    border-radius:12px;
    font-weight:600;
    background:linear-gradient(
        135deg,
        #7c3aed,
        #a855f7
    );
    transition:.3s;
}

.btn-login:hover{
    transform:translateY(-3px);
    box-shadow:0 0 25px rgba(168,85,247,.5);
}

.bottom-text{
    text-align:center;
    margin-top:20px;
    color:#9ca3af;
}

.bottom-text a{
    color:#a855f7;
    text-decoration:none;
    font-weight:600;
}

.bottom-text a:hover{
    color:#c084fc;
}

.footer{
    margin-top:25px;
    text-align:center;
    color:#6b7280;
    font-size:13px;
}

@media(max-width:576px){

.login-card{
    padding:25px;
}

.title{
    font-size:28px;
}

}

</style>

</head>

<body>

<div class="login-card">


<div class="logo">🚀</div>

<h1 class="title">Welcome Back</h1>

<p class="subtitle">
    Login to manage your shortened URLs
</p>

<form action="/login" method="post">

    <input
        type="email"
        name="email"
        class="form-control mb-3"
        placeholder="Enter Email"
        required>

    <input
        type="password"
        name="password"
        class="form-control mb-3"
        placeholder="Enter Password"
        required>

    <button
        type="submit"
        class="btn btn-login text-white w-100">

        Login

    </button>

</form>

<div class="bottom-text">

    Don't have an account?

    <a href="/register">
        Register
    </a>

</div>

<div class="footer">

    URL Shortener Pro • Spring Boot • MySQL

</div>


</div>

</body>
</html>
